snr: 30
cur_str: thirdd
num_snrs: 1
n_ants: 4
snr_step: 1
n_users: 4
mcs: 5 # [0..4] - QPSK, [5..10] - 16QAM
mod_pilot: -1
block_length_factor: 5
num_res: 4
cfo:  0
clip_percentage_in_tx: 100
iqmm_gain: 0 # in dB
iqmm_phase: 0 # in degrees
epochs: 2
iterations: 1
pilot_size: 100   # 6000 1000 # pilot bits - should be a multilpier of log2(mod_pilot)
batch_size: 32
shuffle: True
shuffle_augment_priors: False  # Shuffle samples before train/val split in ESCNN to decorrelate from augmenter's own split
shuffle_augment_seed: 15  # Seed for shuffle_augment_priors (-1 = random each run)
escnn_use_primary_val_only: True  # If True, ESCNN trains only on primary detector's validation portion
learning_rate: 5.0e-4 # 5.0e-4
kernel_size: 3
stag_re_kernel_size: 3
full_e2e: True
ber_on_one_user: -1
sphere_radius: 200
save_loss_plot_snr: [15]
use_film: False
scale_input: True
escnn_dropout: 0.0
escnn_weight_decay: 1e-3  # Dropout rate after each hidden conv layer (0.0 = disabled). Try 0.2-0.4 for 256QAM overfitting
override_noise_var: False
make_64QAM_16QAM_percentage: 0
increase_prime_modulation: False  # QPSK→16QAM or 16QAM→64QAM based on mod_pilot
sphere_64qam_mode: '1245'  # Which 4 bits the sphere decoder handles: '0235', '0134', or '1245'

use_data_as_pilots: False
plot_only_last_iteration: False
plot_channel: False
plot_genie: False

channel_model: 'C' # 'N' = flat, 'A'/'B'/'C' = TDL, 'UMa'/'UMi'/'RMa' = QuaDRiGa (MATLAB pre-generated), 'SUMa'/'SUMi'/'SRMa' = Sionna
carrier_frequency: 2.6e9 # in Hz
speed: 0 # in m/s
spatial_correlation: 'high' # Options: none, low, medium, medium_a, high, custom
# Sionna environment channel settings (used when channel_model is SUMa, SUMi, or SRMa)
env_o2i_model: 'low'          # outdoor-to-indoor model: 'low' or 'high' (SUMa/SUMi only)
env_bs_height: 25.0           # BS antenna height [m]
env_ut_height: 1.5            # UT height [m]
env_distance: 100.0           # BS-UT distance [m]
env_indoor: False             # UE indoor state
env_enable_pathloss: False    # apply pathloss (False for fair BER comparison)
env_enable_shadow_fading: False  # apply shadow fading
# QuaDRiGa channel settings (used when channel_model is UMa, UMi, or RMa)
quadriga_mat_path: '../QuadrigaChannels'  # relative to project root; use absolute path to override
pilot_channel_seed: -1
channel_seed: 123

transfer_cnn: False  # When True with pilot_channel_seed > 0: train CNN on seed_a, then train only scale on seed_b
run_deeprx: False
run_deepsic: False
run_deepsicmb: False
run_deepstag: False
run_mhsa: False
run_sphere: False
run_tdcnn: False
run_tdfdcnn: False
run_jointllr: False
which_augment: 'AUGMENT_SPHERE' # 'AUGMENT_LMMSE', 'AUGMENT_SPHERE', 'AUGMENT_DEEPSIC', 'AUGMENT_DEEPRX', 'NO_AUGMENT'
override_augment_with_lmmse: False

mhsa_no_probs: True

deeprx_override: True

run_e2e: False
iters_e2e: 1
calc_mi: True
save_llrs: False  # Save all LLRs per SNR point to HDF5 (float16 + gzip)
no_probs: False
separate_pilots: True



# general
seed: 0 # run seed

# channel
cfo_and_iqmm_in_rx: True



# validation phase protocol
block_length: -1 # 8004 2000 # coherence block time, total size of pilot + data. values: int.  - should be a multilpier of log2(mod_pilot)
blocks_num: 1 # 100 number of validation frames. values: int.