snr: 40
cur_str: trasfer_mod
num_snrs: 1
n_ants: 8
snr_step: 1
n_users: 4
mcs: 4
mod_pilot: -1
block_length_factor: 3
num_res: 4
cfo: 0
clip_percentage_in_tx: 100
iqmm_gain: 0 # in dB
iqmm_phase: 0 # in degrees
epochs: 2
iterations: 1
pilot_size: 100
batch_size: 1024
shuffle: False
shuffle_augment_priors: False
shuffle_augment_seed: 15  # Seed for shuffle_augment_priors (-1 = random each run)
escnn_use_primary_val_only: False  # If True, ESCNN trains only on primary detector's validation portion
early_stopping_patience: 20  # Early stopping patience in epochs. -1 = disabled. When > 0, training stops if val loss hasn't improved for this many epochs and best-val-loss weights are restored. Affects DeepSIC, DeepRX, ESCNN.
log_train_every_epochs: 50  # Print training progress every N epochs (DeepSIC/DeepRX/ESCNN). 0 or -1 disables training progress prints (start/per-epoch/done).
log_sphere_every_symbols: 5000  # Print sphere decoder progress every N symbols inside the per-symbol loop (sphere_decoder + sphere_64QAM_1245). 0 or -1 disables.
learning_rate: 5.0e-4
kernel_size: 3
stag_re_kernel_size: 3
full_e2e: True
ber_on_one_user: -1
sphere_radius: 200
save_loss_plot_snr: [40]
use_film: False
scale_input: True
escnn_dropout: 0.0
escnn_weight_decay: 0.0
override_noise_var: False
make_64QAM_16QAM_percentage: 0
increase_prime_modulation: False
sphere_64qam_mode: '1245'  # Which 4 bits the sphere decoder handles: '0235', '0134', or '1245'

use_data_as_pilots: False
plot_only_last_iteration: False
plot_channel: False
plot_genie: False

channel_model: 'C'
carrier_frequency: 2.6e9 # in Hz
speed: 0 # in m/s
spatial_correlation: 'low'
# Environment channel settings (used when channel_model is UMa, UMi, or RMa)
env_o2i_model: 'low'          # outdoor-to-indoor model: 'low' or 'high' (UMa/UMi only)
env_bs_height: 25.0           # BS antenna height [m]
env_ut_height: 1.5            # UT height [m]
env_distance: 100.0           # BS-UT distance [m]
env_indoor: False             # UE indoor state
env_enable_pathloss: False    # apply pathloss (False for fair BER comparison)
env_enable_shadow_fading: False  # apply shadow fading
channel_seed: 17

run_deeprx: False
run_deepsic: False
run_deepsicmb: False
run_deepstag: False
run_mhsa: False
run_sphere: False
run_tdcnn: False
run_tdfdcnn: False
run_jointllr: False
which_augment: 'AUGMENT_LMMSE'
override_augment_with_lmmse: False

mhsa_no_probs: True

deeprx_override: True

run_e2e: False
iters_e2e: 1
no_probs: False
no_samples: False  # ESCNN-only: feed only LLRs (no rx samples). Mutually exclusive with no_probs.
calc_mi: True
llr_nll_mode: 'fitted'  # 'none' (show BER on plot), 'consistent' (NLL with σ²=2μ), 'fitted' (NLL with free σ²), 'both'
save_llrs: False  # Save all LLRs per SNR point to HDF5 (float16 + gzip)
separate_pilots: True

# ESCNN train/test transfer (run 1 trains+saves under one config; run 2 loads+tests under another)
save_escnn_weights: False  # Save trained ESCNN weights to Scratchpad/<params>_<tag>.pt (no date/time, same params as the CSV filename)
escnn_weights_only: False  # When True (with save_escnn_weights), train+save then exit immediately - skips inference/BER/plots/CSV to save time
load_escnn_weights_tag: 'a0e680'  # Short tag (printed when saving) identifying which saved weights file to load before this run; '' = don't load (ordinary from-scratch run)
load_escnn_weights_snr_override: -1  # SNR is excluded from the tag, so by default the loader matches this run's own SNR. Set >= 0 to deliberately load a different-SNR-trained model (cross-SNR transfer test).
escnn_load_freeze: 'none'  # 'none', 'scale', 'first_conv', 'second_conv', 'last_conv', 'scale_only', 'last_conv_only', 'first_conv_only', 'first_conv_and_scale_only', 'all'



# general
seed: 0 # run seed

# channel
cfo_and_iqmm_in_rx: True



# validation phase protocol
block_length: -1 # 8004 2000 # coherence block time, total size of pilot + data. values: int.  - should be a multilpier of log2(mod_pilot)
blocks_num: 1 # 100 number of validation frames. values: int.